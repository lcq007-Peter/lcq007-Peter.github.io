<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter | AI Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入圆润可爱的字体：Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f7ff;
            color: #2c3e50;
            overflow-x: hidden;
        }

        /* 1. 动感二次元背景：毛玻璃 + 漂浮波点 */
        .anime-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(1.05);
            transform: scale(1.05);
        }
        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(224,242,254,0.6));
            background-image: radial-gradient(#38bdf8 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.3;
        }

        /* 2. 果冻回弹动画 (Bouncy) */
        .bounce-in {
            opacity: 0;
            transform: scale(0.3);
            animation: jellyIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes jellyIn {
            to { opacity: 1; transform: scale(1); }
        }

        /* 3. 核心：人物破框站立 (Out of Bounds) */
        .character-mount {
            position: absolute;
            bottom: -50px;
            right: -30px;
            height: 120%;
            z-index: 20;
            pointer-events: none;
            /* 呼吸浮动动效 */
            animation: characterFloat 4s ease-in-out infinite;
        }
        @keyframes characterFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        /* 4. 二次元圆角卡片 */
        .anime-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 4px solid #ffffff;
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.15);
            position: relative;
            overflow: visible; /* 允许内容破框 */
        }

        /* 5. 专属二次元UI装饰 */
        .shining-star {
            position: absolute;
            color: #fcd34d;
            animation: pulse 1.5s infinite alternate;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 背景层 -->
    <div class="anime-bg"></div>
    <div class="bg-overlay"></div>

    <!-- 主交互卡片 -->
    <main class="anime-card w-full max-w-5xl p-8 md:p-12 flex flex-col lg:flex-row items-center gap-12 z-10 bounce-in">
        
        <!-- 装饰星星 ✨ -->
        <span class="shining-star text-3xl top-6 left-6">✦</span>
        <span class="shining-star text-2xl bottom-10 left-1/2">✦</span>

        <!-- 左侧内容区 -->
        <div class="flex-1 text-left relative z-10">
            <!-- 顶部头像与名字 -->
            <div class="flex items-center gap-4 mb-6">
                <div class="w-14 h-14 rounded-full border-4 border-white shadow-lg overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Arona&backgroundColor=b6e3f4" alt="avatar" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 class="text-2xl font-black text-cyan-600">Peter</h2>
                    <p class="text-sm font-bold text-gray-400">/// AI 研究员</p>
                </div>
            </div>

            <!-- 主标题 -->
            <h1 class="text-4xl md:text-5xl font-black text-slate-800 leading-tight mb-4">
                早上好，老师！<br>
                今天也要继续构建<br>
                <span class="text-cyan-500">超酷的 AI 吗？</span>
            </h1>

            <p class="text-slate-600 text-sm md:text-base mb-8 max-w-md leading-relaxed font-bold">
                这里是 Peter 的神经中枢。主攻大语言模型和数据算法，偶尔也会写写这些充满魔法的生动前端。
            </p>

            <!-- 萌系按钮组 -->
            <div class="flex flex-wrap gap-4">
                <button class="px-6 py-3 bg-cyan-400 hover:bg-cyan-500 text-white font-black rounded-full shadow-[0_8px_0_#0284c7] hover:translate-y-[2px] hover:shadow-[0_6px_0_#0284c7] transition-all">
                    访问代码库 🚀
                </button>
                <button class="px-6 py-3 bg-white border-2 border-cyan-400 text-cyan-500 font-black rounded-full shadow-[0_8px_0_#e0f2fe] hover:translate-y-[2px] hover:shadow-[0_6px_0_#e0f2fe] transition-all">
                    查阅日志 (๑•̀ㅂ•́)و✧
                </button>
            </div>
        </div>

        <!-- 右侧视觉区：立绘破框！ -->
        <div class="relative w-full lg:w-[320px] h-[350px] lg:h-[450px]">
            <!-- 底座发光环 -->
            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-[200px] h-[40px] bg-cyan-300/30 rounded-full blur-lg"></div>
            
            <!-- 核心：透明背景二次元立绘 -->
            <img src="https://raw.githubusercontent.com/ironfist-moe/anime-assets/main/arona_render.png" 
                 alt="Anime Girl" 
                 class="character-mount">
                 
            <!-- 漂浮的气泡卡片 -->
            <div class="absolute top-10 left-[-20px] bg-white/90 px-4 py-2 rounded-2xl shadow-lg border-2 border-cyan-200 text-cyan-600 text-xs font-bold animate-bounce">
                System: 运转正常! ✨
            </div>
        </div>

    </main>

</body>
</html>
