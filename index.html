<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter.Nexus | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #7000ff;
            --bg: #020617;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            overflow: hidden; /* 禁止滚动，打造全屏终端感 */
            cursor: none; /* 隐藏原生鼠标，使用自定义光标 */
        }

        /* 1. 自定义量子光标 */
        #custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        /* 2. 3D 视差容器 */
        .parallax-wrapper {
            perspective: 1000px;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-terminal {
            width: 90%;
            max-width: 1100px;
            height: 600px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 24px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        /* 3. 二次元全息立绘 & 故障动效 */
        .hologram-girl {
            position: absolute;
            right: -50px;
            bottom: -20px;
            height: 110%;
            z-index: 10;
            filter: drop-shadow(0 0 20px var(--primary));
            animation: glitch 4s infinite;
            pointer-events: none;
        }

        @keyframes glitch {
            0% { transform: translate(0); clip-path: inset(0 0 0 0); }
            2% { transform: translate(-5px, 2px); clip-path: inset(10% 0 40% 0); }
            4% { transform: translate(5px, -2px); clip-path: inset(50% 0 10% 0); }
            6% { transform: translate(0); }
            100% { transform: translate(0); }
        }

        /* 4. 磁力按钮 */
        .mag-button {
            transition: transform 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        /* 5. 动态 HUD 边框 */
        .hud-line {
            position: absolute;
            background: var(--primary);
            opacity: 0.3;
        }
        .v-line { width: 1px; height: 100px; }
        .h-line { height: 1px; width: 100px; }

        /* 6. 背景 Canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .neon-text {
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--accent);
        }
    </style>
</head>
<body>

    <!-- 背景量子粒子场 -->
    <canvas id="particle-canvas"></canvas>
    
    <!-- 自定义跟随光标 -->
    <div id="custom-cursor"></div>

    <div class="parallax-wrapper">
        <!-- 主终端界面 -->
        <div class="main-terminal p-10 flex flex-col justify-between overflow-hidden" id="terminal">
            
            <!-- HUD 装饰角 -->
            <div class="hud-line h-line top-0 left-0"></div>
            <div class="hud-line v-line top-0 left-0"></div>
            <div class="hud-line h-line bottom-0 right-0"></div>
            <div class="hud-line v-line bottom-0 right-0"></div>

            <!-- 顶栏 -->
            <header class="flex justify-between items-center relative z-20">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center font-bold text-2xl shadow-lg">P</div>
                    <div>
                        <h2 class="text-xl font-bold tracking-tighter neon-text">PETER.NEXUS</h2>
                        <p class="text-[10px] text-cyan-400 font-mono opacity-70">STATUS: CORE_EVOLUTION_ACTIVE</p>
                    </div>
                </div>
                <div class="flex gap-6 text-xs font-mono">
                    <span class="text-gray-500">MEM: 12.4GB</span>
                    <span class="text-cyan-400">LATENCY: 14ms</span>
                </div>
            </header>

            <!-- 中间内容区 -->
            <div class="relative z-20 flex-1 flex flex-col justify-center mt-10">
                <h1 class="text-6xl md:text-8xl font-black mb-4 tracking-tight">
                    NEXT-GEN <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-purple-500">AI AGENT.</span>
                </h1>
                <p class="max-w-md text-gray-400 text-sm leading-relaxed mb-8 border-l-2 border-cyan-500 pl-4">
                    > Peter 正在重新定义人类与机器的交互边界。 <br>
                    > 深度学习、神经渲染、以及极致的感官体验。
                </p>

                <!-- 交互区 -->
                <div class="flex gap-6">
                    <button class="mag-button px-10 py-4 bg-cyan-500 text-black font-black rounded-sm skew-x-[-12deg] hover:bg-white transition-all shadow-[8px_8px_0_rgba(112,0,255,0.6)]">
                        初始化连接
                    </button>
                    <button class="mag-button px-10 py-4 border border-cyan-500 text-cyan-500 font-bold rounded-sm skew-x-[-12deg] hover:bg-cyan-500/10 transition-all">
                        查看源代码
                    </button>
                </div>
            </div>

            <!-- 底部实时代码流 -->
            <footer class="relative z-20 flex justify-between items-end">
                <div class="font-mono text-[10px] text-gray-500">
                    <div>[0.4552] ATTACH_AI_CORE... DONE</div>
                    <div>[0.8922] LOADING_NEURAL_WEIGHTS... 100%</div>
                    <div class="text-cyan-400">> ALL SYSTEMS OPERATIONAL</div>
                </div>
                <div class="text-right">
                    <div class="text-3xl font-bold font-mono">24.04.01</div>
                    <div class="text-[10px] text-purple-400">PETER_PRIVATE_TERMINAL</div>
                </div>
            </footer>

            <!-- 全息少女立绘 -->
            <img src="https://raw.githubusercontent.com/ironfist-moe/anime-assets/main/arona_render.png" 
                 alt="AI Interface" 
                 class="hologram-girl" id="character">
        </div>
    </div>

    <script>
        // 1. 3D 视差动效
        const terminal = document.getElementById('terminal');
        const character = document.getElementById('character');
        
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            terminal.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            
            // 人物反向视差，增强景深
            character.style.transform = `translateX(${-xAxis * 2}px) translateY(${-yAxis * 2}px)`;
            
            // 鼠标跟随
            const cursor = document.getElementById('custom-cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 2. 磁力按钮逻辑
        const buttons = document.querySelectorAll('.mag-button');
        buttons.forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px) skewX(-12deg)`;
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = `translate(0px, 0px) skewX(-12deg)`;
            });
        });

        // 3. 背景粒子 Canvas (神经网络模拟)
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 242, 254, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
