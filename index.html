<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter | Neural Nexus</title>
    <!-- 引入 Tailwind, Animate.css 和 Three.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.css">
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;900&family=Noto+Sans+SC:wght@500;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #7000ff;
            --glass: rgba(15, 23, 42, 0.75);
        }
        body {
            font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
            background-color: #020617;
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        /* 1. 背景网格与极光 (参考源码中的 blog-hero__grid) */
        .hero-backdrop {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }
        .glow-orb {
            position: absolute;
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.15), transparent 70%);
            filter: blur(80px);
            animation: drift 20s infinite alternate;
        }

        @keyframes drift { to { transform: translate(100px, 100px); } }

        /* 2. 3D 地球容器 */
        .earth-3d-wrap {
            display: inline-block;
            width: 1em; height: 1em;
            vertical-align: middle;
            margin-left: 0.2em;
        }

        /* 3. 精致卡片 (Bento Box) */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 4. 二次元立绘 (破框效果) */
        .character-portrait {
            position: absolute;
            top: -60px;
            right: 20px;
            height: 120%;
            z-index: 20;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
            transform: rotate(5deg);
            transition: all 0.4s ease;
        }
        .character-portrait:hover {
            transform: rotate(0deg) scale(1.05);
        }

        /* 5. 聊天浮窗样式 (参考 chat-widget 代码) */
        .chat-panel {
            position: fixed; bottom: 100px; right: 30px;
            width: 350px; height: 500px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-bubble {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            cursor: pointer;
            z-index: 1001;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.3);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="hero-backdrop">
        <div class="glow-orb" style="top: 10%; left: 10%;"></div>
    </div>

    <!-- 顶部导航 -->
    <nav class="relative z-50 flex justify-between items-center mb-16 animate__animated animate__fadeInDown">
        <div class="flex items-center gap-3">
            <span class="text-2xl font-black tracking-tighter">PETER<span class="text-cyan-400">.LOG</span></span>
        </div>
        <div class="hidden md:flex gap-10 text-sm font-bold opacity-70">
            <a href="#" class="hover:text-cyan-400">终端</a>
            <a href="#" class="hover:text-cyan-400">算力</a>
            <a href="#" class="hover:text-cyan-400">日志</a>
        </div>
    </nav>

    <!-- 主 Hero 区 (致敬 blog-hero) -->
    <main class="relative z-10 max-w-7xl mx-auto flex flex-col lg:flex-row gap-10">
        
        <!-- 左侧核心区 -->
        <div class="flex-1 flex flex-col justify-center">
            <div class="animate__animated animate__fadeInLeft">
                <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 text-xs font-bold mb-6">
                    <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                    CORE SYSTEM: ACTIVE
                </div>
                
                <h1 class="text-7xl md:text-8xl font-black leading-[0.9] mb-8">
                    Hello <br> World<span class="earth-3d-wrap"><canvas id="earth-canvas"></canvas></span>
                </h1>

                <p class="text-xl text-gray-400 max-w-lg mb-10 leading-relaxed">
                    AI 工程师 | 探索大模型边界，致力于将人类智慧与硅基逻辑完美融合。
                </p>

                <div class="flex gap-4">
                    <button class="px-8 py-4 bg-white text-black font-black rounded-2xl hover:scale-105 transition-all">访问矩阵</button>
                    <button class="px-8 py-4 bg-gray-800/50 border border-gray-700 text-white font-black rounded-2xl">关于我</button>
                </div>
            </div>
        </div>

        <!-- 右侧检索区 (致敬 blog-hero__panel-card) -->
        <div class="w-full lg:w-[450px] relative animate__animated animate__fadeInRight">
            <!-- 破框立绘 -->
            <img src="https://raw.githubusercontent.com/ironfist-moe/anime-assets/main/arona_render.png" class="character-portrait" alt="character">
            
            <div class="glass-card p-10 mt-16 lg:mt-0 relative h-full">
                <span class="text-cyan-400 font-bold text-xs tracking-[0.2em] mb-4 block">EXPLORE NEXUS</span>
                <h2 class="text-3xl font-black mb-4">从控制台直接检索</h2>
                <p class="text-gray-400 text-sm mb-10 leading-relaxed">输入关键词，我们将通过神经链路直接定位所有文章、记录和相册内容。</p>

                <!-- 搜索框 -->
                <div class="bg-gray-950/80 rounded-2xl p-2 flex border border-gray-800 mb-6">
                    <input type="text" placeholder="输入搜索协议..." class="bg-transparent border-none outline-none flex-1 px-4 text-sm">
                    <button class="bg-gradient-to-r from-cyan-500 to-blue-600 px-6 py-3 rounded-xl font-bold text-xs">执行搜索</button>
                </div>

                <div class="flex flex-wrap gap-2">
                    <span class="px-3 py-1.5 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold">每日新闻</span>
                    <span class="px-3 py-1.5 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold">算法实验室</span>
                    <span class="px-3 py-1.5 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold">相册矩阵</span>
                </div>
            </div>
        </div>
    </main>

    <!-- AI 聊天组件 (致敬 chat-widget) -->
    <div class="chat-panel glass-card animate__animated" id="chatPanel">
        <div class="p-4 border-b border-white/10 flex justify-between items-center bg-white/5">
            <span class="text-sm font-bold text-cyan-400">AI 助手控制台</span>
            <button class="text-gray-400 hover:text-white" onclick="toggleChat()">✕</button>
        </div>
        <div class="flex-1 p-4 overflow-y-auto space-y-4 text-sm" id="chatMsgs">
            <div class="bg-gray-800/50 p-3 rounded-2xl rounded-bl-none max-w-[80%]">
                你好，Peter！系统已就绪，随时可以进行逻辑推演。
            </div>
        </div>
        <div class="p-4 border-t border-white/10 flex gap-2">
            <input type="text" placeholder="发送指令..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm outline-none focus:border-cyan-500 transition-all">
            <button class="bg-cyan-500 p-2 rounded-xl">🚀</button>
        </div>
    </div>

    <div class="chat-bubble" onclick="toggleChat()">
        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>

    <script>
        // 1. 三维核心 (Three.js Earth Logic)
        function init3D() {
            const canvas = document.getElementById('earth-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            
            renderer.setSize(100, 100);
            camera.position.z = 2;

            const geometry = new THREE.SphereGeometry(1, 32, 32);
            const material = new THREE.MeshPhongMaterial({
                color: 0x0ea5e9,
                wireframe: true,
                transparent: true,
                opacity: 0.5
            });
            const earth = new THREE.Mesh(geometry, material);
            scene.add(earth);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            function animate() {
                requestAnimationFrame(animate);
                earth.rotation.y += 0.01;
                earth.rotation.x += 0.005;
                renderer.render(scene, camera);
            }
            animate();
        }

        // 2. 聊天浮窗逻辑
        function toggleChat() {
            const panel = document.getElementById('chatPanel');
            if (panel.style.display === 'flex') {
                panel.classList.replace('animate__fadeInUp', 'animate__fadeOutDown');
                setTimeout(() => panel.style.display = 'none', 500);
            } else {
                panel.style.display = 'flex';
                panel.classList.add('animate__fadeInUp');
            }
        }

        window.onload = init3D;
    </script>
</body>
</html>
