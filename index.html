<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jian の Blog - 首页</title>
    <!-- 引入 Tailwind CSS (CDN版本，方便直接运行) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 自定义一些特定的颜色和动画配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-dark': '#0b1120',      // 整体背景深蓝
                        'card-dark': '#131b2f',    // 卡片背景稍亮的深蓝
                        'accent-cyan': '#06b6d4',  // 主题青色
                    }
                }
            }
        }
    </script>
    <style>
        /* 引入好看的无衬线字体 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; color: white; }
        
        /* 左下角的青色背景光晕效果 */
        .glow-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, rgba(11,17,32,0) 70%);
            bottom: -50px;
            left: -50px;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">

    <!-- 顶部导航栏 -->
    <nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto border-b border-gray-800/50">
        <!-- Logo 区域 -->
        <div class="flex items-center gap-3">
            <span class="text-2xl font-bold tracking-tight">Jian の Blog</span>
            <svg class="w-5 h-5 text-gray-400 cursor-pointer hover:text-white transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <!-- 头像占位 -->
            <div class="w-8 h-8 rounded-full bg-indigo-500 overflow-hidden ml-2 border border-gray-600">
                 <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Jian" alt="Avatar" class="w-full h-full object-cover">
            </div>
        </div>
        
        <!-- 右侧菜单 -->
        <div class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-300">
            <a href="#" class="text-white border-b-2 border-white pb-1">首页</a>
            <a href="#" class="hover:text-white transition">每日新闻</a>
            <a href="#" class="hover:text-white transition flex items-center gap-1">博客 <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></a>
            <a href="#" class="hover:text-white transition">相册</a>
            <a href="#" class="hover:text-white transition flex items-center gap-1">小虾 <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></a>
        </div>
    </nav>

    <!-- 主体内容区域 -->
    <main class="max-w-7xl mx-auto px-8 py-16 grid grid-cols-1 lg:grid-cols-2 gap-12 relative z-10">
        
        <!-- 左侧光晕 -->
        <div class="glow-bg"></div>

        <!-- === 左侧区域：Hero Section === -->
        <div class="flex flex-col justify-center relative z-10">
            <!-- 标签 -->
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-800/50 border border-gray-700/50 text-xs w-max mb-6">
                <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
                <span class="text-gray-300 tracking-wider">JIAN の BLOG</span>
            </div>

            <!-- 大标题 -->
            <h1 class="text-7xl md:text-8xl font-bold leading-tight tracking-tight mb-4 flex items-center gap-4">
                Hello<br>World 
                <!-- 地球图标占位 -->
                <span class="text-6xl mt-4">🌍</span>
            </h1>
            
            <p class="text-gray-400 text-lg mb-8">AI 工程师 | 记录技术、 生活与思考</p>

            <!-- 技能标签 -->
            <div class="flex flex-wrap gap-3 mb-10">
                <span class="px-4 py-2 rounded-full bg-gray-800/40 border border-gray-700/50 text-sm hover:bg-gray-700/50 cursor-pointer transition">AI 工程实践</span>
                <span class="px-4 py-2 rounded-full bg-emerald-900/30 text-emerald-400 border border-emerald-800/50 text-sm">5 篇内容沉淀</span>
                <span class="px-4 py-2 rounded-full bg-gray-800/40 border border-gray-700/50 text-sm hover:bg-gray-700/50 cursor-pointer transition">技术 · 生活 · 思考</span>
            </div>

            <!-- 按钮组 -->
            <div class="flex items-center gap-4 mb-10">
                <button class="px-8 py-3 rounded-2xl bg-slate-700 hover:bg-slate-600 text-white font-semibold transition shadow-lg">浏览文章</button>
                <button class="px-8 py-3 rounded-2xl bg-transparent border border-gray-600 hover:bg-gray-800 text-white font-semibold transition">关于我</button>
            </div>

            <!-- 社交图标 -->
            <div class="flex items-center gap-4">
                <a href="#" class="p-3 rounded-full bg-gray-800/50 border border-gray-700/50 hover:text-accent-cyan transition"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"></path></svg></a>
                <a href="#" class="p-3 rounded-full bg-gray-800/50 border border-gray-700/50 hover:text-accent-cyan transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></a>
                <a href="#" class="p-3 rounded-full bg-gray-800/50 border border-gray-700/50 hover:text-accent-cyan transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 19C6 19 8 13 14 13M6 13C6 13 8 7 14 7M4 19A2 2 0 006 21H18A2 2 0 0020 19V5A2 2 0 0018 3H6A2 2 0 004 5V19Z"></path></svg></a>
            </div>
        </div>

        <!-- === 右侧区域：搜索互动卡片 === -->
        <div class="relative flex items-center justify-center lg:justify-end mt-12 lg:mt-0 pt-10 pr-4">
            
            <!-- 倾斜的二次元插图 (绝对定位在卡片上方) -->
            <!-- 注意：这里使用了一张随机动漫图代替，你可以替换 src 为你自己的图片 -->
            <img src="https://i.pinimg.com/736x/d6/ed/b5/d6edb5da1e43b67954e3895e7960fc0e.jpg" 
                 alt="Logbook Character" 
                 class="absolute top-[-40px] right-[20px] w-48 h-64 object-cover rounded-xl shadow-2xl z-20 border-4 border-gray-800"
                 style="transform: rotate(10deg);">

            <!-- 主卡片容器 -->
            <div class="bg-card-dark border border-gray-700/50 rounded-3xl p-8 w-full max-w-md relative z-10 shadow-2xl">
                
                <p class="text-accent-cyan text-xs font-bold tracking-widest mb-2">EXPLORE</p>
                <h2 class="text-3xl font-bold mb-4 leading-tight">从首页直接<br>搜索整个网站。</h2>
                <p class="text-gray-400 text-sm mb-8 leading-relaxed">
                    输入关键词后回车，直接带您去所有文章、日常记录和相册内容。
                </p>

                <!-- 搜索框区域 -->
                <div class="bg-gray-900/50 border border-gray-700/80 rounded-2xl p-2 flex items-center mb-6">
                    <svg class="w-5 h-5 text-gray-500 ml-3 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" placeholder="搜索文章、相册、日常记录..." class="bg-transparent border-none outline-none text-sm text-gray-300 w-full placeholder-gray-600">
                    <button class="bg-accent-cyan hover:bg-cyan-600 text-white text-sm font-semibold py-2 px-5 rounded-xl transition shadow-[0_0_15px_rgba(6,182,212,0.4)]">进入搜索</button>
                </div>

                <!-- 底部快捷标签 -->
                <div class="flex flex-wrap gap-2">
                    <span class="px-4 py-1.5 rounded-full bg-gray-800/60 border border-gray-700/50 text-xs text-gray-300 cursor-pointer hover:text-white transition">首页</span>
                    <span class="px-4 py-1.5 rounded-full bg-gray-800/60 border border-gray-700/50 text-xs text-gray-300 cursor-pointer hover:text-white transition">每日新闻</span>
                    <span class="px-4 py-1.5 rounded-full bg-gray-800/60 border border-gray-700/50 text-xs text-gray-300 cursor-pointer hover:text-white transition">博客</span>
                    <span class="px-4 py-1.5 rounded-full bg-gray-800/60 border border-gray-700/50 text-xs text-gray-300 cursor-pointer hover:text-white transition">相册</span>
                    <span class="px-4 py-1.5 rounded-full bg-gray-800/60 border border-gray-700/50 text-xs text-gray-300 cursor-pointer hover:text-white transition">小虾</span>
                </div>
            </div>
        </div>

    </main>
</body>
</html>
