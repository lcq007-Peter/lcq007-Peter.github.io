<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter の Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d1117; /* 极深蓝黑背景 */
            --card-bg: rgba(22, 27, 34, 0.6); /* 半透明卡片背景 */
            --accent-blue: #38bdf8;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            color: #e6edf3;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 顶部导航增强 */
        .nav-glass {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 主容器：磨砂玻璃质感 */
        .main-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* 文字背后的环境光晕 */
        .glow-sphere {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(56, 189, 248, 0) 70%);
            top: 10%;
            left: -100px;
            z-index: 0;
            pointer-events: none;
            animation: pulse-glow 8s infinite alternate;
        }

        @keyframes pulse-glow {
            from { opacity: 0.5; transform: scale(1); }
            to { opacity: 1; transform: scale(1.2); }
        }

        /* 右侧倾斜立绘卡片 */
        .character-card {
            position: absolute;
            top: -40px;
            right: 20px;
            width: 180px;
            height: 240px;
            z-index: 20;
            transform: rotate(10deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
        }
        .character-card:hover {
            transform: rotate(5deg) translateY(-10px) scale(1.05);
        }
        .character-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            border: 4px solid rgba(255, 255, 255, 0.1);
        }

        /* 搜索按钮渐变 */
        .btn-search {
            background: linear-gradient(135deg, #0ea5e9, #2dd4bf);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
            transition: all 0.3s ease;
        }
        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.5);
        }

        /* 社交图标微动效 */
        .social-link {
            transition: all 0.3s ease;
            opacity: 0.7;
        }
        .social-link:hover {
            opacity: 1;
            transform: translateY(-3px);
            color: var(--accent-blue);
        }

        /* 响应式调整 */
        @media (max-width: 1024px) {
            .character-card { display: none; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 顶部导航 -->
    <nav class="nav-glass fixed top-0 inset-x-0 z-50 px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <span class="text-xl font-bold tracking-tight">Peter の Blog</span>
            <div class="w-8 h-8 rounded-full overflow-hidden border border-gray-700">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Peter" alt="avatar">
            </div>
        </div>
        <div class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-400">
            <a href="#" class="text-white">首页</a>
            <a href="#" class="hover:text-white transition">每日新闻</a>
            <a href="#" class="hover:text-white transition">博客</a>
            <a href="#" class="hover:text-white transition">相册</a>
            <a href="#" class="hover:text-white transition">项目</a>
        </div>
    </nav>

    <!-- 主便当盒区域 -->
    <main class="max-w-6xl mx-auto mt-24 w-full main-container p-8 md:p-16 flex flex-col lg:flex-row gap-16 relative">
        
        <!-- 背景环境光 -->
        <div class="glow-sphere"></div>

        <!-- 左侧内容区 -->
        <div class="flex-1 z-10">
            <!-- 顶部小标签 -->
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-gray-800/50 border border-gray-700/50 text-[10px] font-bold tracking-widest text-gray-400 mb-8">
                <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
                PETER の BLOG
            </div>

            <!-- 核心标题 -->
            <div class="relative mb-6">
                <h1 class="text-7xl md:text-8xl font-extrabold tracking-tighter leading-none">
                    Hello<br>World
                </h1>
                <!-- 3D地球占位 -->
                <div class="absolute top-1/2 right-0 md:right-20 transform -translate-y-1/2 text-6xl">🌍</div>
            </div>

            <p class="text-gray-400 text-lg mb-10 font-medium">AI 工程师 | 记录技术、生活与思考</p>

            <!-- 技能标签组 -->
            <div class="flex flex-wrap gap-3 mb-12">
                <span class="px-4 py-2 rounded-xl bg-gray-800/40 border border-gray-700/50 text-xs font-semibold">AI 工程实践</span>
                <span class="px-4 py-2 rounded-xl bg-emerald-900/20 text-emerald-400 border border-emerald-800/30 text-xs font-semibold">12 篇内容沉淀</span>
                <span class="px-4 py-2 rounded-xl bg-gray-800/40 border border-gray-700/50 text-xs font-semibold">技术 · 生活 · 思考</span>
            </div>

            <!-- 操作按钮 -->
            <div class="flex items-center gap-4 mb-12">
                <button class="px-8 py-3.5 rounded-2xl bg-white text-black font-bold hover:bg-gray-200 transition-all shadow-xl">浏览文章</button>
                <button class="px-8 py-3.5 rounded-2xl bg-gray-800/50 border border-gray-700 hover:bg-gray-700 transition-all text-white font-bold">关于我</button>
            </div>

            <!-- 社交图标 -->
            <div class="flex items-center gap-6">
                <a href="#" class="social-link"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"></path></svg></a>
                <a href="#" class="social-link"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></a>
                <a href="#" class="social-link"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 19C6 19 8 13 14 13M6 13C6 13 8 7 14 7M4 19A2 2 0 006 21H18A2 2 0 0020 19V5A2 2 0 0018 3H6A2 2 0 004 5V19Z"></path></svg></a>
            </div>
        </div>

        <!-- 右侧搜索互动区 -->
        <div class="w-full lg:w-[400px] relative">
            
            <!-- 倾斜立绘卡片 (绝对定位，破框而出) -->
            <div class="character-card">
                <img src="https://raw.githubusercontent.com/ironfist-moe/anime-assets/main/arona_render.png" alt="Card Character">
            </div>

            <!-- 搜索面板 -->
            <div class="bg-gray-900/40 border border-gray-700/50 rounded-[32px] p-8 h-full relative z-10 flex flex-col">
                <p class="text-cyan-400 text-[10px] font-bold tracking-widest mb-2">EXPLORE</p>
                <h2 class="text-3xl font-bold mb-4 leading-tight">从首页直接<br>搜索整个网站。</h2>
                <p class="text-gray-400 text-sm mb-10 leading-relaxed">
                    输入关键词后回车，直接带您去速定位文章、日常记录和相册内容。
                </p>

                <!-- 搜索条 -->
                <div class="bg-gray-950/50 border border-gray-800 rounded-2xl p-2 flex items-center mb-6">
                    <input type="text" placeholder="搜索关键词..." class="bg-transparent border-none outline-none text-sm text-gray-300 w-full px-4">
                    <button class="btn-search text-white text-xs font-bold py-3 px-6 rounded-xl shrink-0">进入搜索</button>
                </div>

                <!-- 底部快捷标签 -->
                <div class="flex flex-wrap gap-2 mt-auto">
                    <span class="px-3 py-1.5 rounded-full bg-gray-800/60 border border-gray-700/50 text-[10px] text-gray-300 cursor-pointer hover:bg-gray-700 transition">首页</span>
                    <span class="px-3 py-1.5 rounded-full bg-gray-800/60 border border-gray-700/50 text-[10px] text-gray-300 cursor-pointer hover:bg-gray-700 transition">每日新闻</span>
                    <span class="px-3 py-1.5 rounded-full bg-gray-800/60 border border-gray-700/50 text-[10px] text-gray-300 cursor-pointer hover:bg-gray-700 transition">博客</span>
                    <span class="px-3 py-1.5 rounded-full bg-gray-800/60 border border-gray-700/50 text-[10px] text-gray-300 cursor-pointer hover:bg-gray-700 transition">相册</span>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
